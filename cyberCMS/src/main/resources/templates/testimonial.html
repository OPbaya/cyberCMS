<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Testimonials</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- SIDEBAR -->
    <div id="sidebar">
        <h4 class="text-center py-3">Admin Panel</h4>
    
        <a href="/dashboard">Dashboard</a>
        <a href="/admin/categories">Categories</a>
        <a href="/admin/best-practices">Best Practices</a>
        <a href="/admin/policies">Policies</a>
        <a href="/admin/it-services">IT Services</a>
        <a href="/admin/testimonials">Testimonials</a>
    </div>
    <div class="container mt-5">

        <h2 class="text-center mb-4">Testimonials</h2>

        <!-- FORM -->
        <div class="card mb-4 shadow">
            <div class="card-header bg-warning">Add / Edit Testimonial</div>
            <div class="card-body">

                <form action="/admin/testimonials/save" method="post">

                    <input type="hidden" name="id" th:value="${testimonial.id}" />

                    <input class="form-control mb-2" name="name" placeholder="Name" th:value="${testimonial.name}"
                        required>

                    <input class="form-control mb-2" name="jobPost" placeholder="Job Post" th:value="${testimonial.jobPost}"
                        required>

                    <input class="form-control mb-2" name="message" placeholder="Message"
                        th:value="${testimonial.message}" required>

                    <button class="btn btn-success">Save</button>

                </form>

            </div>
        </div>

        <!-- TABLE -->
        <div class="card shadow">
            <div class="card-header bg-dark text-white">All Testimonials</div>
            <div class="card-body">

                <table class="table table-bordered">
                    <tr>
                        <th>Name</th>
                        <th>Job Post</th>
                        <th>Message</th>
                        <th>Actions</th>
                    </tr>

                    <tr th:each="t : ${list}">
                        <td th:text="${t.name}"></td>
                        <td th:text="${t.jobPost}"></td>
                        <td th:text="${t.message}"></td>
                        <td>
                            <a th:href="@{/admin/testimonials/edit/{id}(id=${t.id})}"
                                class="btn btn-warning btn-sm">Edit</a>
                            <a th:href="@{/admin/testimonials/delete/{id}(id=${t.id})}"
                                class="btn btn-danger btn-sm">Delete</a>
                        </td>
                    </tr>

                </table>

            </div>
        </div>

    </div>

</body>

</html>
