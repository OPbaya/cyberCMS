<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

    <h2>Add Best Practice</h2>
    <!-- <input type="hidden" th:field="*{id}" /> -->

    <form th:action="@{/admin/best-practices/save}" method="post" th:object="${bestPractice}" enctype="multipart/form-data">
        <input type="hidden" name="id" th:value="${bestPractice.id}" />
        <!-- <input type="hidden" th:field="*{id}" /> -->
    
        Title: <input type="text" th:field="*{title}" /><br><br>
    
        Description: <textarea th:field="*{description}"></textarea><br><br>
    
        <div th:if="${bestPractice.image != null}">
            Current Image: <img th:src="${bestPractice.image}" alt="Current" style="max-width:160px; display:block; margin-bottom:10px;" />
        </div>
        Upload Image: <input type="file" name="imageFile" accept="image/*" /><br><br>
    
        Category:
        <select name="categoryId">
            <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}">
            </option>
        </select>
    
        <br><br>
        <button type="submit">Save</button>
    
    </form>

    <!-- <a href="/best-practice/list">View List</a> -->
    <a href="/">View List</a>

</body>

</html>
