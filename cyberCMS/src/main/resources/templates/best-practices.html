<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Best Practices</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- SIDEBAR -->
    <div id="sidebar">
        <h4 class="text-center py-3">Admin Panel</h4>
    
        <a href="/dashboard">Dashboard</a>
        <a href="/admin/categories">Categories</a>
        <a href="/admin/best-practices">Best Practices</a>
        <a href="/admin/policies">Policies</a>
        <a href="/admin/it-services">IT Services</a>
        <a href="/admin/testimonials">Testimonials</a>
    </div>
    <div class="container mt-5">

        <h2 class="mb-4 text-center">Best Practices</h2>

        <!-- ================= FORM ================= -->
        <div class="card mb-4 shadow">
            <div class="card-header bg-primary text-white">
                Add / Edit Best Practice
            </div>

            <div class="card-body">

                <form action="/admin/best-practices/save" method="post" enctype="multipart/form-data">

                    <input type="hidden" name="id" th:value="${bestPractice.id}" />

                    <div class="mb-2">
                        <input class="form-control" name="title" placeholder="Title" th:value="${bestPractice.title}"
                            required>
                    </div>

                    <div class="mb-2">
                        <input class="form-control" name="description" placeholder="Description"
                            th:value="${bestPractice.description}" required>
                    </div>

                    <div class="mb-2" th:if="${bestPractice.image != null}">
                        <label class="form-label">Current Image</label>
                        <img th:src="${bestPractice.image}" alt="Current Image"
                            style="max-width: 160px; max-height: 120px; display: block; margin-bottom: 10px;" />
                    </div>

                    <div class="mb-2">
                        <label class="form-label">Upload Image</label>
                        <input class="form-control" type="file" id="imageFile" name="imageFile" accept="image/*">
                    </div>

                    <div class="mb-2">
                        <img id="previewImg" src="#" alt="Image preview"
                            style="display:none; max-width: 160px; max-height: 120px; margin-top: 8px;" />
                    </div>

                    <div class="mb-2">
                        <select class="form-control" name="categoryId">
                            <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"
                                th:selected="${bestPractice.category != null && bestPractice.category.id == c.id}">
                            </option>
                        </select>
                    </div>

                    <button class="btn btn-success">Save</button>

                </form>

            </div>
        </div>

        <!-- ================= TABLE ================= -->
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                All Best Practices
            </div>

            <div class="card-body">

                <table class="table table-bordered table-hover">

                    <thead class="table-dark">
                        <tr>
                            <th>Image</th>
                            <th>Title</th>
                            <th>Description</th>
                            <th>Category</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody>

                        <tr th:each="bp : ${list}">
                            <td>
                                <img th:if="${bp.image != null}" th:src="${bp.image}"
                                    alt="Preview" style="max-width: 80px; max-height: 60px; display: block;" />
                                <span th:if="${bp.image == null}">No image</span>
                            </td>
                            <td th:text="${bp.title}"></td>
                            <td th:text="${bp.description}"></td>
                            <td th:text="${bp.category != null ? bp.category.name : 'No Category'}"></td>
                            <td th:text="${bp.status}"></td>

                            <td>
                                <a th:href="@{/admin/best-practices/edit/{id}(id=${bp.id})}"
                                    class="btn btn-warning btn-sm">Edit</a>

                                <a th:href="@{/admin/best-practices/delete/{id}(id=${bp.id})}"
                                    class="btn btn-danger btn-sm" onclick="return confirm('Delete this?')">
                                    Delete
                                </a>
                            </td>
                        </tr>

                    </tbody>

                </table>

            </div>
        </div>

    </div>

    <script>
        document.getElementById('imageFile')?.addEventListener('change', function (event) {
            const file = event.target.files[0];
            const preview = document.getElementById('previewImg');
            if (!file) {
                preview.style.display = 'none';
                preview.src = '#';
                return;
            }
            const reader = new FileReader();
            reader.onload = function (e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        });
    </script>

</body>

</html>
